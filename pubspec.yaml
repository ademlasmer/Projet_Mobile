  intl: ^0.18.1
  crypto: ^3.0.3
  path_provider: ^2.1.2
  sqflite_common_ffi: ^2.4.0+3
  sqflite_common_ffi_web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
